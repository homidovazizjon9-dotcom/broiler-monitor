<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт по рынку бройлеров</title>

  <!-- Фикс мобильного масштаба -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #f2f4f8;
      max-width: 100vw;
      overflow-x: hidden;
      font-size: 16px;
    }

    .header {
      background: #1976d2;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }

    /* Без фиксированной высоты — Chart сам управляет размером */
    canvas {
      width: 100% !important;
      max-height: 320px;
      display: block;
    }

    .back-btn {
      margin: 12px auto;
      display: block;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #e5e7eb;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
    }

    @media (min-width: 1200px) {
      body {
        font-size: 18px;
      }

      .header {
        font-size: 22px;
        padding: 20px;
      }

      .container {
        max-width: 980px;
        padding: 24px;
      }

      .card {
        padding: 22px;
      }

      canvas {
        max-height: 380px;
      }

      .back-btn {
        font-size: 18px;
        padding: 14px;
        max-width: 420px;
      }
    }
  </style>
</head>

<body>

  <div class="header">📊 Отчёт по рынку бройлеров</div>

  <div class="container">

    <a href="index.html">
      <button class="back-btn">⬅ Вернуться к вводу данных</button>
    </a>

    <div class="card">
      <h3>Средняя цена по неделям</h3>
      <canvas id="weekChart"></canvas>
    </div>

    <div class="card">
      <h3>Средняя цена по конкурентам</h3>
      <canvas id="competitorChart"></canvas>
    </div>

  </div>

  <script src="report.js"></script>
</body>
</html>
