<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Список записей</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:#f2f4f8;
      font-size: 16px;
    }

    .container {
      max-width: 960px;
      margin: 24px auto;
      padding: 18px;
    }

    h1 {
      text-align:center;
      margin-bottom:20px;
    }

    /* Навигация */
    .nav-row {
      margin-bottom: 20px;
      text-align: center;
    }

    .nav-btn {
      width: 100%;
      max-width: 320px;
      font-size: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #e5e7eb;
      color: #111;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: #d1d5db;
    }

    /* Фильтры */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .filters select,
    .filters input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .filters button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #1976d2;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .filters button:hover {
      background: #155fa0;
    }

    table {
      width:100%;
      border-collapse: collapse;
      background:#fff;
      border-radius:12px;
      overflow:hidden;
    }

    th, td {
      padding:12px;
      border-bottom:1px solid #eee;
      text-align:left;
    }

    tr:hover {
      background:#f1f5ff;
      cursor:pointer;
    }

    th {
      background:#1976d2;
      color:#fff;
    }

    @media (min-width: 1200px) {
      body {
        font-size: 18px;
      }

      .container {
        max-width: 1200px;
        padding: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .nav-btn {
        font-size: 18px;
        max-width: 360px;
        padding: 14px;
      }

      .filters select,
      .filters input {
        font-size: 16px;
        padding: 12px;
      }

      th, td {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Навигация -->
    <div class="nav-row">
      <a href="index.html">
        <button class="nav-btn">⬅ Вернуться к вводу данных</button>
      </a>
    </div>

    <h1>📋 Последние записи</h1>

    <!-- Фильтры -->
    <div class="filters">
      <select id="filterCompetitor">
        <option value="">Все конкуренты</option>
      </select>

      <input type="date" id="filterDate">

      <button onclick="applyFilters()">Применить фильтр</button>
    </div>

    <!-- Таблица -->
    <table id="recordsTable">
      <thead>
        <tr>
          <th>Дата</th>
          <th>Конкурент</th>
          <th>Цена</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script src="list.js"></script>
</body>
</html>
